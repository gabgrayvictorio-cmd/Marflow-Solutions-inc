name: Marflow UI Auto-Deploy

on:
  push:
    branches: ["main"] # GitHub Actions triggers every time you save code here
  workflow_dispatch:   # Adds a manual 'Run' button just in case

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v4

      - name: Upload UI Artifacts 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # This grabs your index.html and CSS folders

      - name: Deploy to GitHub Pages 🌐
        id: deployment
        uses: actions/deploy-pages@v4
